# DoRA Training Configuration - LegalRisk-LLM
# Base Model: Llama-3.2-3B-Instruct
# Hardware: RTX 4060 (8GB VRAM), 32GB RAM, Windows
# Method: DoRA (LoRA + magnitude/direction decomposition)
#
# DoRA vs QLoRA: IDENTICAL except use_dora=True (handled in trainer class)
# DoRA decomposes weight updates into magnitude and direction components,
# potentially improving quality at low ranks (r=16) with ~10% training overhead.

method: "dora"

model:
  name: "unsloth/Llama-3.2-3B-Instruct"
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: true
  attn_implementation: "sdpa"
  trust_remote_code: false

peft:
  method: "lora"
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_dora: true                           # ONLY DIFFERENCE FROM QLORA
  use_rslora: false

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"

  # Memory optimization (CRITICAL for 8GB VRAM)
  gradient_checkpointing: true             # Saves 40% VRAM at cost of 20% speed
  fp16: false                              # Temporarily disabled fp16 due to BFloat16 compatibility issue
  bf16: false
  optim: "adamw_torch"                     # Standard Adam optimizer (changed from paged_adamw_8bit for compatibility)

  # Data handling
  max_seq_length: 1024
  packing: false
  group_by_length: true

  # Checkpointing
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

  # Logging and evaluation
  logging_steps: 10
  evaluation_strategy: "steps"
  eval_steps: 50
  logging_first_step: true
  report_to: "wandb"

data:
  train_path: "data/synthetic/train.jsonl"
  val_path: "data/synthetic/val.jsonl"
  test_path: "data/synthetic/test.jsonl"

wandb:
  project: "legalrisk-llm"
  entity: null
  tags:
    - "dora"
    - "llama-3.2-3b"
    - "legal-risk"
    - "phase-2a"

output:
  dir: "./models/dora"
  adapter_name: "legalrisk-dora-adapter"
  push_to_hub: false

# Expected DoRA improvements over QLoRA:
# - 5-10% lower eval loss (better quality)
# - 10-15% slower training (decomposition overhead)
# - Same memory usage (DoRA adds no VRAM overhead)
# - Slightly larger adapter size (~90MB vs 80MB)
