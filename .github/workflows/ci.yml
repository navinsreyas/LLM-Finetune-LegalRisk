name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-deploy.txt pytest

      # No GROQ_API_KEY (or any secret) is passed to this job. tests/test_api.py
      # patches RAGPipeline before the app starts, so /classify never touches the
      # real pipeline or the Groq API -- this run is fully mocked, network-free.
      - name: Run tests
        run: pytest tests/ -v
